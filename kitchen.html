<!DOCTYPE html>
<html>
<head>
    <base target="_top" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Kitchen Display System</title>
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        padding: 10px; /* ลด Padding ขอบจอลงเล็กน้อย */
        background-color: #f4f4f9;
        margin: 0;
        /* ป้องกันการขยายตัวอักษรอัตโนมัติในมือถือบางรุ่น */
        -webkit-text-size-adjust: 100%;
      }

      h2 {
        font-size: 1.5rem;
        margin: 15px 5px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      /* ปรับข้อความรีเฟรชให้อ่านออกในมือถือ */
      #refreshingStatus {
        font-size: 0.8rem; 
        color: #2196f3;
        font-weight: normal;
        background: #e3f2fd;
        padding: 2px 8px;
        border-radius: 10px;
      }

      .order-container {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 10px;
      }

      /* ขยายขนาดการ์ดและพื้นที่สัมผัส */
      .order-card {
        background: white;
        padding: 18px; /* เพิ่ม Padding ให้กดง่ายขึ้น */
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        cursor: pointer;
        border-left: 8px solid #ff9800; /* เส้นหนาขึ้นเพื่อให้เห็นสถานะชัดๆ */
        transition: transform 0.1s;
        -webkit-tap-highlight-color: transparent; /* ลบไฮไลท์สีฟ้าเวลาแตะ */
      }

      .order-card:active {
        transform: scale(0.98); /* เอฟเฟกต์ยุบตัวเวลาแตะจริง */
        background: #fafafa;
      }

      .order-info {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 8px;
      }

      /* ขยายชื่อเมนูให้อ่านง่าย */
      .menu-name {
        font-weight: bold;
        font-size: 1.3rem;
        color: #333;
        line-height: 1.2;
      }

      .time-stamp {
        color: #777;
        font-size: 0.9rem;
        background: #eee;
        padding: 2px 6px;
        border-radius: 4px;
      }

      /* ปรับปรุงการแสดงผลเลขโต๊ะและสถานะ */
      .order-status-row {
        font-size: 1.1rem;
        color: #555;
      }

      .order-status-row strong {
        color: #000;
        text-transform: uppercase;
        background: #f0f0f0;
        padding: 0 5px;
        border-radius: 3px;
      }

      /* ส่วนเรียกพนักงาน (Call Section) */
      .call-card {
        background: #fff3f3;
        border-left: 8px solid #e53935;
        padding: 15px;
        border-radius: 10px;
        margin-bottom: 10px;
        box-shadow: 0 4px 8px rgba(229, 57, 53, 0.2);
        animation: blink 1.5s infinite alternate;
      }

      @keyframes blink {
        from { opacity: 1; }
        to { opacity: 0.8; }
      }

      .fade-out {
        opacity: 0;
        transform: scale(0.9);
        transition: all 0.3s ease;
      }
    </style>
</head>
  <body>
    <h2>
      รายการ
      <span id="refreshingStatus">(กำลังรีเฟรช...)</span>
    </h2>

    <div id="callSection" style="margin-bottom: 15px">
      <div id="callList"></div>
    </div>

    <div id="orderList" class="order-container">กำลังโหลดข้อมูล...</div>

    <script>
      const WEB_APP_URL =
        "https://script.google.com/macros/s/AKfycbzXuk7TTQ_NhOfvQyb-uwHSAc8GmsVL1qBVH5aFjbieZ01b30DQ1I4Q-288AdAKdCBh/exec?view=kitchen";
    </script>

    <script>
      const statusEl = document.getElementById("refreshingStatus");
      const container = document.getElementById("orderList");

      let renderedOrderIds = new Set();
      let isFirstLoad = true;
      let updateQueue = [];

      //  เรียกพนักงาน
      let renderedCallIds = new Set();
      let pendingCallKeys = new Set();
      
      async function loadCalls() {
        try {
          const res = await fetch(
            "https://script.google.com/macros/s/AKfycbzXuk7TTQ_NhOfvQyb-uwHSAc8GmsVL1qBVH5aFjbieZ01b30DQ1I4Q-288AdAKdCBh/exec?mode=calls"
          );

          const data = await res.json();
          const filtered = data.filter(item => {
              const key = item.table + "_" + item.timestamp;

              return item.status !== 'done' && !pendingCallKeys.has(key);
          });

          const callList = document.getElementById("callList");

          // ✅ เคลียร์ก่อน render ใหม่
          callList.innerHTML = "";
          renderedCallIds.clear();

          console.log("RAW DATA:", data);

          filtered.sort((a, b) => b.timestamp - a.timestamp); // ใหม่อยู่บน

filtered.forEach((item) => {
  const key = item.table + "_" + item.timestamp;

  if (!renderedCallIds.has(key)) {
    const div = document.createElement("div");
    div.className = "call-card";
    div.onclick = () => handleCallDone(item, div);

    const table = item.table;
    const timeStr = new Date(item.timestamp).toLocaleTimeString();

console.log(item);    
    
    // ✅ แยก type
    const isBill = item.type === 'bill';
    const icon = isBill ? '💵' : '🔔';
    const label = isBill ? 'เรียกเก็บเงิน' : 'เรียกพนักงาน';

    // ✅ format ราคา (กัน undefined)
    const price = item.total_price 
        ? Number(item.total_price).toLocaleString() 
        : '-';

    div.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center;">
        
        <!-- ซ้าย -->
        <div>
          <div><strong>${icon} โต๊ะ ${table} ${label} </strong></div>
          <div style="font-size:12px;">${timeStr}</div>
        </div>

        <!-- กลาง
        <div style="text-align:center; font-size:12px;">
          ${label}
        </div>
 -->
        <!-- ขวา -->
        <div style="text-align:right;">
          ${isBill ? `<strong>${price} บาท</strong>` : ``}
        </div>

      </div>
    `;

    callList.prepend(div);
    renderedCallIds.add(key);
  }
});
        } catch (err) {
          console.error("โหลด call ไม่สำเร็จ", err);
        }
      }

      // กดปุ่มตอบรับเรียกพนักงาน
      function handleCallDone(item, element) {

          const key = item.table + "_" + item.timestamp;

          // ✅ mark ว่ากำลัง pending
          pendingCallKeys.add(key);

        element.style.pointerEvents = 'none';
        element.classList.add('fade-out');
        setTimeout(() => {
            element.remove();
        }, 300);

          updateQueue.push({
              type: 'call',
              table: item.table,
              timestamp: item.timestamp,
              status: 'done'
          });
      }

      //
      function getNextStatus(current) {
        if (current === "pending") return "cooking";
        if (current === "cooking") return "done";
        return "done";
      }

      function updateCardStyle(card, status) {
        if (status === "pending") {
          card.style.borderLeftColor = "#ff9800"; // ส้ม
        } else if (status === "cooking") {
          card.style.borderLeftColor = "#2196F3"; // น้ำเงิน
        } else if (status === "done") {
          card.style.borderLeftColor = "#4CAF50"; // เขียว
        }
      }
      async function loadOrders() {
        statusEl.style.display = "inline";

        try {
          const response = await fetch(WEB_APP_URL);
          const ggs_data = await response.json();
          const data = ggs_data.filter((item) => item.status !== "done");

          // 1. เรียงลำดับจากเก่าสุดไปใหม่สุด (เพื่อให้รายการใหม่ไปต่อท้ายสุดเสมอ)
          data.sort((a, b) => a.timestamp - b.timestamp);

          // 2. จัดการหน้าจอครั้งแรก
          if (isFirstLoad) {
            container.innerHTML = "";
            if (data.length === 0) {
              container.innerHTML = "ไม่มีรายการค้าง";
            }
          }

          // 3. วนลูปด้วย standard for loop เพื่อความชัวร์ในการทำงานต่อเนื่อง
          for (let i = 0; i < data.length; i++) {
            const item = data[i];

            // สร้าง Unique Key โดยการรวม ID และ ชื่อเมนู (ป้องกันกรณี ID ซ้ำแต่คนละเมนู)
            const timeStr = new Date(item.timestamp).toLocaleTimeString();
            const itemKey = item.order_id + "_" + item.menu + "_" + timeStr;

            // ตรวจสอบว่า Key นี้ยังไม่เคยถูกวาด
            if (!renderedOrderIds.has(itemKey)) {
              if (container.innerText === "ไม่มีรายการค้าง") {
                container.innerHTML = "";
              }

              const card = createOrderCard(item);
              container.appendChild(card);

              // บันทึก Unique Key ลงใน Set
              renderedOrderIds.add(itemKey);
            }
          }

          // 4. เปลี่ยนสถานะหลังจากมั่นใจว่า loop ข้างบนทำงานเสร็จหมดแล้ว
          isFirstLoad = false;
        } catch (error) {
          console.error("Error:", error);
          if (isFirstLoad)
            container.innerHTML = "เกิดข้อผิดพลาดในการโหลดข้อมูล";
        } finally {
          // ซ่อนสถานะรีเฟรช
          setTimeout(() => {
            statusEl.style.display = "none";
          }, 500);
        }
      }

      function createOrderCard(item) {
        const card = document.createElement("div");
        card.className = "order-card";
        card.onclick = () => {
          if (item.status === "done") return;

          const nextStatus = getNextStatus(item.status);

          // ✅ เปลี่ยน UI ทันที
          item.status = nextStatus;
          card.querySelector("strong").innerText = nextStatus;
          updateCardStyle(card, nextStatus);

          // ✅ เก็บเข้าคิวแทนยิงทันที
          updateQueue.push({
            type: 'order', 
            order_id: item.order_id,
            menu: item.menu,
            status: nextStatus,
          });

          // fade out ถ้า done
          if (nextStatus === "done") {
            card.style.pointerEvents = "none";

            setTimeout(() => {
              card.classList.add("fade-out");
              setTimeout(() => card.remove(), 500);
            }, 300);
          }
        };

        const timeStr = new Date(item.timestamp).toLocaleTimeString();
        card.innerHTML = `
            <div class="order-info">
                <span class="menu-name">${item.menu} (x${item.qty})</span>
                <span class="time-stamp">${timeStr}</span>
            </div>
            <div>โต๊ะ: ${item.table_no} | สถานะ: <strong>${item.status}</strong></div>
        `;
        updateCardStyle(card, item.status);
        return card;
      }

async function flushUpdates() {
    if (updateQueue.length === 0) return;
console.log("🔥 flushing:", updateQueue); // ✅ เพิ่ม
    const queueCopy = [...updateQueue];
    updateQueue = [];

    try {
        await fetch(WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'batchUpdate',
                updates: queueCopy
            })
        });

        // ✅ เพิ่มตรงนี้ 👇
        queueCopy.forEach(update => {
            if (update.type === 'call') {
                const key = update.table + "_" + update.timestamp;
                pendingCallKeys.delete(key);
            }
        });

    } catch (err) {
        console.error('Batch update failed:', err);

        // ❗ rollback
        updateQueue = [...queueCopy, ...updateQueue];
    }
}
      
      setInterval(flushUpdates, 10000);
      setInterval(loadCalls, 10000);

      loadOrders();

      setInterval(loadOrders, 10000); // รีเฟรชทุก 10 วินาที
    </script>
  </body>
</html>
